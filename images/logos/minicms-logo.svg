<svg width="220" height="52" viewBox="0 0 220 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="minicmsLogoTitle minicmsLogoDesc">
  <title id="minicmsLogoTitle">MiniCMS logo</title>
  <desc id="minicmsLogoDesc">Text-only MiniCMS wordmark.</desc>
  <defs>
    <linearGradient id="minicmsWordmarkGradient" x1="0" y1="10" x2="180" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="minicmsUnderlineGradient" x1="0" y1="0" x2="124" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <text x="2" y="31" fill="url(#minicmsWordmarkGradient)" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="800" letter-spacing="0.5">MiniCMS</text>
  <rect x="4" y="38" width="124" height="4" rx="2" fill="url(#minicmsUnderlineGradient)"/>
</svg>
